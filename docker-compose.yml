services:
  redis:
    image: redis:latest
    container_name: my_redis_container
    ports:
      - "6379:6379"
    command: ["redis-server", "--requirepass", "YourStrongPassword123"]
    restart: always
  mongodb:
    image: mongo:latest
    container_name: webapishop-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./docker/mongo-init:/docker-entrypoint-initdb.d
    restart: always
  kafka:
    image: apache/kafka:3.8.0
    container_name: webapishop-kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@webapishop-kafka:9093
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - CLUSTER_ID=5L6g3nShT-eMCtK--X86sw
    restart: always
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: webapishop-kafka-ui
    ports:
      - "8081:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=webapishop-local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=webapishop-kafka:9092
    depends_on:
      - kafka
    restart: always

volumes:
  mongo_data:
